<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小小書法家 - 漢字練習簿</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Hanzi Writer -->
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <!-- 引入 SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @font-face {
            font-family: 'Kaiti';
            src: local('BiauKai'), local('DFKai-SB'), local('Kaiti TC'), local('STKaiti'), local('KaiTi');
        }
        body {
            font-family: 'Kaiti', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #78716c; 
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%2357534e' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
            /* 避免網頁在手機上下滾動 */
            overscroll-behavior: none;
        }
        .xuan-paper {
            background-color: #fdf6e3; 
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), inset 0 0 20px rgba(139, 69, 19, 0.1);
            position: relative;
        }
        
        /* 畫布與 SVGs 自適應縮放 */
        #paper-container { position: relative; }
        .grid-svg { position: absolute; inset: 0; pointer-events: none; z-index: 10; width: 100%; height: 100%; }
        #character-target { position: absolute; inset: 0; z-index: 20; touch-action: none; width: 100%; height: 100%; }
        /* 強制 HanziWriter 產生的 SVG 填滿容器，達到 RWD 效果 */
        #character-target svg { width: 100% !important; height: 100% !important; }
        #freehand-canvas {
            position: absolute; inset: 0; z-index: 30; 
            touch-action: none; pointer-events: none; cursor: crosshair;
            width: 100%; height: 100%; /* 顯示大小自適應容器 */
        }

        .btn-press { transition: transform 0.1s, box-shadow 0.1s; }
        .btn-press:active { transform: translateY(2px); box-shadow: none !important; }
        .mode-active {
            ring: 4px; ring-color: #fbbf24; transform: translateY(2px);
            box-shadow: none !important; filter: brightness(1.1);
        }
    </style>
</head>
<!-- 使用 h-[100dvh] 解決各種手機瀏覽器高度適應問題 -->
<body class="flex flex-col items-center justify-center h-[100dvh] w-full md:p-4 p-0 m-0 overflow-hidden">

    <!-- 容器自動填滿剩餘高度，並在小螢幕時無圓角 -->
    <div class="max-w-md w-full h-full md:h-auto bg-white md:rounded-2xl shadow-2xl flex flex-col overflow-hidden border-0 md:border-4 border-amber-900/20">
        
        <!-- 頂部區塊 (不縮放 shrink-0) -->
        <div class="bg-amber-100 py-3 px-4 border-b-2 border-amber-200 flex flex-col gap-3 shrink-0">
            <h1 class="text-xl font-bold text-amber-900 flex items-center gap-2">
                <span class="text-2xl">✍️</span> 小小書法家
            </h1>
            
            <!-- 第一排：輸入字帖 -->
            <div class="flex gap-2">
                <input type="text" id="char-input" value="天地玄黃" placeholder="輸入多個字..." 
                       class="flex-1 h-10 px-3 text-lg font-bold border-2 border-amber-300 rounded focus:outline-none focus:border-amber-600 bg-white"
                       onclick="this.select()">
                <button onclick="loadCharacters()" 
                        class="bg-amber-600 text-white px-4 py-1 rounded hover:bg-amber-700 active:bg-amber-800 transition font-bold whitespace-nowrap shadow-sm">
                    載入字帖
                </button>
            </div>

            <!-- 第二排：更顯眼的上下一張導航 -->
            <div class="flex items-center justify-between bg-white/60 p-1.5 rounded-xl border border-amber-200/60 shadow-inner">
                <button onclick="prevChar()" class="flex-1 py-1.5 bg-white hover:bg-amber-200 rounded-lg text-amber-800 disabled:opacity-40 disabled:hover:bg-white transition shadow-sm font-bold flex items-center justify-center gap-1 active:bg-amber-300" id="btn-prev">
                    <span>⬅️</span> 上一字
                </button>
                <span id="char-progress" class="font-bold text-amber-900 text-lg w-16 text-center">-/-</span>
                <button onclick="nextChar()" class="flex-1 py-1.5 bg-white hover:bg-amber-200 rounded-lg text-amber-800 disabled:opacity-40 disabled:hover:bg-white transition shadow-sm font-bold flex items-center justify-center gap-1 active:bg-amber-300" id="btn-next">
                    下一字 <span>➡️</span>
                </button>
            </div>
        </div>

        <!-- 中間畫布區 (自適應剩餘空間 flex-1, 最小高度 min-h-0 防擠壓) -->
        <div class="flex-1 p-2 sm:p-4 flex flex-col items-center justify-center bg-gray-50 overflow-hidden min-h-0">
            <!-- 畫布容器：使用 aspect-square 保持正方形，最大不超過 300px -->
            <div id="paper-container" class="xuan-paper border-4 border-red-700/80 rounded-sm w-full max-w-[300px] aspect-square shrink-0">
                <svg class="grid-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
                    <line x1="0" y1="0" x2="300" y2="300" stroke="#dc2626" stroke-dasharray="6,6" stroke-width="2" opacity="0.4"/>
                    <line x1="300" y1="0" x2="0" y2="300" stroke="#dc2626" stroke-dasharray="6,6" stroke-width="2" opacity="0.4"/>
                    <line x1="150" y1="0" x2="150" y2="300" stroke="#dc2626" stroke-dasharray="6,6" stroke-width="2" opacity="0.4"/>
                    <line x1="0" y1="150" x2="300" y2="150" stroke="#dc2626" stroke-dasharray="6,6" stroke-width="2" opacity="0.4"/>
                </svg>
                <div id="character-target"></div>
                <!-- Canvas 內部解析度維持 300x300，確保墨跡清晰 -->
                <canvas id="freehand-canvas" width="300" height="300"></canvas>
            </div>
            
            <div id="status-msg" class="mt-2 h-8 text-base sm:text-lg font-bold text-amber-700 flex items-center justify-center text-center shrink-0">
                請選擇下方的練習模式！
            </div>
        </div>

        <!-- 底部控制按鈕區 (不縮放 shrink-0) -->
        <div class="bg-amber-50 p-2 sm:p-4 grid grid-cols-2 gap-2 sm:gap-3 border-t-2 border-amber-100 shrink-0">
            <button onclick="startAnimation()" class="btn-press flex flex-col items-center justify-center py-2 sm:py-3 bg-blue-500 text-white rounded-xl shadow-[0_4px_0_#2563eb] hover:bg-blue-400">
                <span class="text-xl sm:text-2xl mb-0.5 sm:mb-1">🎬</span>
                <span class="font-bold text-sm sm:text-base">筆畫示範</span>
            </button>
            <button id="btn-quiz" onclick="startQuizMode()" class="btn-press flex flex-col items-center justify-center py-2 sm:py-3 bg-green-500 text-white rounded-xl shadow-[0_4px_0_#16a34a] hover:bg-green-400">
                <span class="text-xl sm:text-2xl mb-0.5 sm:mb-1">🎯</span>
                <span class="font-bold text-sm sm:text-base">筆順測驗</span>
            </button>
            <button id="btn-classic" onclick="startClassicMode()" class="btn-press flex flex-col items-center justify-center py-2 sm:py-3 bg-purple-500 text-white rounded-xl shadow-[0_4px_0_#9333ea] hover:bg-purple-400">
                <span class="text-xl sm:text-2xl mb-0.5 sm:mb-1">🖌️</span>
                <span class="font-bold text-sm sm:text-base">自由書寫</span>
            </button>
            <button onclick="resetCanvas()" class="btn-press flex flex-col items-center justify-center py-2 sm:py-3 bg-red-400 text-white rounded-xl shadow-[0_4px_0_#dc2626] hover:bg-red-300">
                <span class="text-xl sm:text-2xl mb-0.5 sm:mb-1">✨</span>
                <span class="font-bold text-sm sm:text-base">清除重來</span>
            </button>
        </div>
    </div>

    <script>
        let writer;
        const targetDiv = document.getElementById('character-target');
        const inputElement = document.getElementById('char-input');
        const statusMsg = document.getElementById('status-msg');
        
        let charList = ['天', '地', '玄', '黃'];
        let currentIndex = 0;

        let speechUtterance = null;
        let animationCanceled = false;
        let speechUnlocked = false;
        let audioCtx = null; 
        
        let hintTimer = null;
        let currentQuizStroke = 0;

        const freehandCanvas = document.getElementById('freehand-canvas');
        const ctx = freehandCanvas.getContext('2d');
        let isDrawing = false;

        ctx.lineWidth = 18;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#333333'; 

        function initWriter(character) {
            targetDiv.innerHTML = '';
            // 引擎大小維持 300x300，實際顯示大小會透過 CSS auto-scaling 自動適應
            writer = HanziWriter.create('character-target', character, {
                width: 300, height: 300, padding: 15,
                strokeAnimationSpeed: 0.8, strokeHighlightSpeed: 0.8, delayBetweenStrokes: 300,
                strokeColor: '#1f2937', radicalColor: '#1f2937', highlightColor: '#ef4444', 
                outlineColor: '#d1d5db', drawingWidth: 18, drawingColor: '#333333', showOutline: true          
            });
        }

        // --- 繪圖修正：動態座標縮放 ---
        // 由於 Canvas 現在會跟著螢幕大小縮放 (RWD)，我們必須將畫面滑動的實際座標，轉換回內部 300x300 解析度的座標。
        function getPointerPos(e) {
            const rect = freehandCanvas.getBoundingClientRect();
            let clientX = e.clientX, clientY = e.clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
            }
            // 計算縮放比例
            const scaleX = 300 / rect.width;
            const scaleY = 300 / rect.height;
            
            return { 
                x: (clientX - rect.left) * scaleX, 
                y: (clientY - rect.top) * scaleY 
            };
        }

        function startDrawing(e) {
            if (e.touches && e.touches.length > 1) return; 
            if (e.cancelable) e.preventDefault(); 
            isDrawing = true;
            const pos = getPointerPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x, pos.y + 0.1); 
            ctx.stroke();
        }

        function draw(e) {
            if (!isDrawing) return;
            if (e.touches && e.touches.length > 1) { stopDrawing(); return; }
            if (e.cancelable) e.preventDefault();
            const pos = getPointerPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function stopDrawing() { isDrawing = false; ctx.beginPath(); }

        freehandCanvas.addEventListener('mousedown', startDrawing);
        freehandCanvas.addEventListener('mousemove', draw);
        freehandCanvas.addEventListener('mouseup', stopDrawing);
        freehandCanvas.addEventListener('mouseout', stopDrawing);

        freehandCanvas.addEventListener('touchstart', startDrawing, { passive: false });
        freehandCanvas.addEventListener('touchmove', draw, { passive: false });
        freehandCanvas.addEventListener('touchend', stopDrawing);
        freehandCanvas.addEventListener('touchcancel', stopDrawing);

        function updateStatus(text, colorClass = 'text-amber-700') {
            statusMsg.className = `mt-2 h-8 text-base sm:text-lg font-bold flex items-center justify-center text-center ${colorClass}`;
            statusMsg.innerText = text;
        }

        function clearActiveButtons() {
            document.getElementById('btn-quiz').classList.remove('mode-active');
            document.getElementById('btn-classic').classList.remove('mode-active');
        }

        // --- 安全防呆的 API 檢查 ---
        function numberToChinese(num) {
            const zh = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
            if (num <= 10) return zh[num];
            if (num < 20) return '十' + (num % 10 === 0 ? '' : zh[num % 10]);
            if (num < 100) return zh[Math.floor(num / 10)] + '十' + (num % 10 === 0 ? '' : zh[num % 10]);
            return num.toString();
        }

        if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        function unlockSpeech() {
            if (window.speechSynthesis && !speechUnlocked) {
                const silentUtterance = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(silentUtterance);
                speechUnlocked = true;
            }
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (AudioContextClass && !audioCtx) {
                try { audioCtx = new AudioContextClass(); } catch (e) { console.warn("AudioContext init failed", e); }
            }
            if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); }
        }
        document.body.addEventListener('touchstart', unlockSpeech, { once: true });
        document.body.addEventListener('click', unlockSpeech, { once: true });

        function speak(text, onEndCallback, interrupt = true) {
            if (!window.speechSynthesis) {
                if (onEndCallback) onEndCallback();
                return;
            }
            if (interrupt) window.speechSynthesis.cancel(); 
            
            try {
                speechUtterance = new SpeechSynthesisUtterance(text);
                speechUtterance.lang = 'zh-TW';
                const voices = window.speechSynthesis.getVoices();
                let bestVoice = voices.find(v => v.lang === 'zh-TW' && (v.name.includes('Google') || v.name.includes('Siri') || v.name.includes('Mei-Jia')));
                if (!bestVoice) bestVoice = voices.find(v => v.lang.includes('zh-TW') || v.lang.includes('zh-HK'));
                if (bestVoice) speechUtterance.voice = bestVoice;

                speechUtterance.rate = 0.9; speechUtterance.pitch = 1.1; 
                if (onEndCallback) {
                    speechUtterance.onend = onEndCallback;
                    speechUtterance.onerror = onEndCallback; 
                }
                window.speechSynthesis.speak(speechUtterance);
            } catch (e) {
                if (onEndCallback) onEndCallback();
            }
        }

        function cancelAnimationSequence() {
            animationCanceled = true;
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        }

        function playFeedbackChord() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                const t = audioCtx.currentTime;
                [523.25, 659.25, 783.99, 1174.66].forEach(freq => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.value = freq;
                    gainNode.gain.setValueAtTime(0, t);
                    gainNode.gain.linearRampToValueAtTime(0.03, t + 0.05); 
                    gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.8); 
                    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                    osc.start(t); osc.stop(t + 0.8);
                });
            } catch (e) {}
        }

        function playMistakeBoop() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(150, t + 0.25);
                gainNode.gain.setValueAtTime(0, t);
                gainNode.gain.linearRampToValueAtTime(0.08, t + 0.03); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.25); 
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + 0.25);
            } catch (e) {}
        }

        function playSuccessArpeggio() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                const t = audioCtx.currentTime;
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = freq;
                    const startTime = t + (i * 0.08); 
                    gainNode.gain.setValueAtTime(0, startTime);
                    gainNode.gain.linearRampToValueAtTime(0.05, startTime + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 1.2);
                    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                    osc.start(startTime); osc.stop(startTime + 1.2);
                });
            } catch (e) {}
        }

        function clearHintTimer() {
            if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
        }

        function resetHintTimer() {
            clearHintTimer();
            hintTimer = setTimeout(showHintGuide, 5000);
        }

        function showHintGuide() {
            if (!writer || !writer._character) return;
            const totalStrokes = writer._character.strokes.length;
            if (currentQuizStroke >= totalStrokes) return;
            writer.updateColor('highlightColor', 'rgba(59, 130, 246, 0.6)');
            writer.highlightStroke(currentQuizStroke);
            setTimeout(() => { writer.updateColor('highlightColor', '#ef4444'); }, 1500);
            resetHintTimer();
        }

        function startAnimation() {
            unlockSpeech(); // 確保每次點擊都強制喚醒語音與音效系統
            clearHintTimer(); clearActiveButtons(); cancelAnimationSequence(); 
            animationCanceled = false;
            writer.cancelQuiz();
            freehandCanvas.style.pointerEvents = 'none'; 
            ctx.clearRect(0, 0, freehandCanvas.width, freehandCanvas.height); 
            writer.showOutline(); writer.hideCharacter();
            updateStatus('仔細看筆順喔！', 'text-blue-600');
            
            // 移除原本的 setTimeout 延遲，直接呼叫語音與動畫
            // 這是為了確保瀏覽器判定語音是由「使用者點擊按鈕」直接觸發的，避免被靜音機制阻擋
            if (!animationCanceled) animateStrokesSequentially(0);
        }

        function animateStrokesSequentially(strokeNum) {
            if (animationCanceled) return;
            const strokes = writer._character.strokes;
            if (!strokes || strokeNum >= strokes.length) {
                updateStatus('示範結束，請選擇下方模式開始練習！', 'text-green-600'); return;
            }
            const zhNum = numberToChinese(strokeNum + 1);
            let strokeAnimDone = false; let speechDone = false;
            function proceedNext() {
                if (strokeAnimDone && speechDone && !animationCanceled) {
                    setTimeout(() => { animateStrokesSequentially(strokeNum + 1); }, 100); 
                }
            }
            const speechTimeout = setTimeout(() => {
                if (!speechDone) { speechDone = true; proceedNext(); }
            }, 1500);
            speak(`${zhNum}`, () => {
                clearTimeout(speechTimeout); speechDone = true; proceedNext();
            }, true);
            writer.animateStroke(strokeNum, {
                onComplete: function() { strokeAnimDone = true; proceedNext(); }
            });
        }

        function startQuizMode() {
            unlockSpeech(); // 確保每次點擊都強制喚醒語音與音效系統
            cancelAnimationSequence(); clearActiveButtons();
            document.getElementById('btn-quiz').classList.add('mode-active');
            freehandCanvas.style.pointerEvents = 'none';
            targetDiv.style.pointerEvents = 'auto';
            ctx.clearRect(0, 0, freehandCanvas.width, freehandCanvas.height); 
            writer.showOutline(); writer.hideCharacter();
            updateStatus('【筆順測驗】寫錯會提示，系統自動修正', 'text-green-600');
            currentQuizStroke = 0; resetHintTimer();

            writer.quiz({
                onMistake: function(strokeData) {
                    writer.updateColor('highlightColor', '#ef4444');
                    playMistakeBoop();
                    updateStatus(`哎呀！第 ${strokeData.strokeNum + 1} 筆畫錯了，再試一次！`, 'text-red-500');
                    resetHintTimer();
                },
                onCorrectStroke: function(strokeData) {
                    currentQuizStroke = strokeData.strokeNum + 1;
                    resetHintTimer();
                    updateStatus(`很棒！繼續寫下一筆。`, 'text-green-600');
                    playFeedbackChord();
                    speak(`${numberToChinese(strokeData.strokeNum + 1)}`, null, true); 
                },
                onComplete: function(summaryData) {
                    clearHintTimer(); updateStatus('太厲害了！筆順完全正確！🌟', 'text-yellow-600');
                    playSuccessArpeggio();
                    if (currentIndex < charList.length - 1) {
                        Swal.fire({
                            title: '筆順過關!', text: '要繼續寫下一個字嗎？', icon: 'success',
                            showCancelButton: true, confirmButtonColor: '#16a34a', cancelButtonColor: '#9333ea',
                            confirmButtonText: '寫下一個字', cancelButtonText: '試試自由書寫'
                        }).then((result) => {
                            clearActiveButtons();
                            if (result.isConfirmed) nextChar();
                        });
                    } else {
                        Swal.fire({ title: '太棒了！', text: '完成所有練習囉！', icon: 'success', confirmButtonColor: '#16a34a', confirmButtonText: '好棒' });
                        clearActiveButtons();
                    }
                }
            });
        }

        function startClassicMode() {
            clearHintTimer(); cancelAnimationSequence(); clearActiveButtons();
            document.getElementById('btn-classic').classList.add('mode-active');
            writer.cancelQuiz(); writer.showOutline(); writer.hideCharacter();
            freehandCanvas.style.pointerEvents = 'auto';
            targetDiv.style.pointerEvents = 'none';
            updateStatus('【自由書寫】現在會留下你真實的筆跡囉！', 'text-purple-600');
        }

        function resetCanvas() {
            clearHintTimer(); cancelAnimationSequence();
            writer.cancelQuiz(); writer.hideCharacter(); writer.showOutline();
            ctx.clearRect(0, 0, freehandCanvas.width, freehandCanvas.height);
            updateStatus('畫布已清除，請重新開始。');
        }

        function updateNavUI() {
            document.getElementById('char-progress').innerText = `${currentIndex + 1}/${charList.length}`;
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex === charList.length - 1;
        }

        function loadCharacters() {
            const newChars = inputElement.value.replace(/\s+/g, ''); 
            if (!newChars) return;
            charList = Array.from(newChars);
            currentIndex = 0; updateNavUI(); loadCurrentCharacter();
        }

        function loadCurrentCharacter() {
            clearHintTimer(); cancelAnimationSequence(); 
            const char = charList[currentIndex];
            updateStatus(`載入「${char}」中...`); clearActiveButtons();
            writer.setCharacter(char).then(() => {
                resetCanvas(); updateStatus(`準備好了！請選擇模式。`);
            }).catch(err => {
                Swal.fire({ icon: 'error', title: '找不到這個字', text: `請點擊下一個字跳過喔！`, confirmButtonColor: '#d97706', confirmButtonText: '好' });
                resetCanvas(); updateStatus(`無法顯示「${char}」，請點擊下一個字。`, 'text-red-500');
            });
        }

        function nextChar() { if (currentIndex < charList.length - 1) { currentIndex++; updateNavUI(); loadCurrentCharacter(); } }
        function prevChar() { if (currentIndex > 0) { currentIndex--; updateNavUI(); loadCurrentCharacter(); } }

        inputElement.addEventListener('keypress', function(e) { if (e.key === 'Enter') loadCharacters(); });
        document.addEventListener('keydown', function(e) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft') prevChar(); else if (e.key === 'ArrowRight') nextChar();
        });

        let touchStartX = 0, touchEndX = 0, isTwoFingerSwipe = false;
        const paperContainer = document.getElementById('paper-container');
        paperContainer.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                isTwoFingerSwipe = true; touchStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2; touchEndX = touchStartX;
            } else isTwoFingerSwipe = false;
        }, { capture: true });
        paperContainer.addEventListener('touchmove', function(e) {
            if (isTwoFingerSwipe && e.touches.length === 2) {
                touchEndX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                if (e.cancelable) e.preventDefault(); 
            }
        }, { capture: true, passive: false });
        paperContainer.addEventListener('touchend', function(e) {
            if (isTwoFingerSwipe) {
                let swipeDistance = touchEndX - touchStartX;
                if (swipeDistance > 40) prevChar(); else if (swipeDistance < -40) nextChar(); 
                isTwoFingerSwipe = false;
            }
        }, { capture: true });

        window.onload = function() {
            try {
                initWriter('天'); 
                loadCharacters(); 
            } catch(e) {
                console.error("Initialization error", e);
                updateStatus('瀏覽器環境不相容，部分功能可能無法使用', 'text-red-500');
            }
        };
    </script>
</body>
</html>
